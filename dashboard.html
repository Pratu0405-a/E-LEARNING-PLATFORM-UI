<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Dashboard - EduVibe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">EduVibe</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="dashboard">
        <div class="section-header">
            <div class="section-tag">✦ Your Progress</div>
            <h2>Learning Dashboard</h2>
            <p class="section-subtitle">Track your progress across all enrolled courses.</p>
        </div>

        <div class="dashboard-grid">

            <div class="course-card" onclick="window.location='course-detail.html?course=web-development'" style="cursor:pointer;">
                <h3><span class="course-icon">💻</span> Web Development</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="web-development-progress"></div>
                </div>
                <div class="progress-footer">
                    <span class="progress-label">Course Progress</span>
                    <span class="progress-percent" id="web-development-text">0%</span>
                </div>
            </div>

            <div class="course-card" onclick="window.location='course-detail.html?course=ui-ux-design'" style="cursor:pointer;">
                <h3><span class="course-icon">🎨</span> UI/UX Design</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="ui-ux-design-progress"></div>
                </div>
                <div class="progress-footer">
                    <span class="progress-label">Course Progress</span>
                    <span class="progress-percent" id="ui-ux-design-text">0%</span>
                </div>
            </div>

            <div class="course-card" onclick="window.location='course-detail.html?course=business-strategy'" style="cursor:pointer;">
                <h3><span class="course-icon">📈</span> Business Strategy</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="business-strategy-progress"></div>
                </div>
                <div class="progress-footer">
                    <span class="progress-label">Course Progress</span>
                    <span class="progress-percent" id="business-strategy-text">0%</span>
                </div>
            </div>

        </div>
    </section>

    <footer>
        <p>© 2024 <span>EduVibe</span> · All Rights Reserved</p>
    </footer>

    <script>
        // Only reads from localStorage - NO auto increase
        // Progress only updates when user clicks Start Learning on course page
        const courses = ['web-development', 'ui-ux-design', 'business-strategy'];

        courses.forEach(function(course) {
            const saved = parseInt(localStorage.getItem(course)) || 0;
            const bar = document.getElementById(course + '-progress');
            const label = document.getElementById(course + '-text');

            // Smooth animate bar from 0 to saved value
            let current = 0;
            const interval = setInterval(function() {
                if (current >= saved) {
                    clearInterval(interval);
                } else {
                    current++;
                    bar.style.width = current + '%';
                    label.innerText = current + '%';
                }
            }, 15);
        });
    </script>
</body>
</html>
