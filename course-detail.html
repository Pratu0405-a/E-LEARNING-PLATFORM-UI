<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - EduVibe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">EduVibe</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="course-detail" style="background: linear-gradient(160deg, #0D0D1A 0%, #1A1A2E 50%, #16213E 100%);">
        <div class="section-tag" style="display:inline-block; margin-bottom:16px;">✦ Course</div>
        <h2 id="course-title">Course Title</h2>

        <div class="video-container">
            <iframe id="course-video" src="" frameborder="0"
                allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
        </div>

        <div id="course-description">Course description will appear here...</div>

        <button id="start-course-btn">▶ Start Course</button>
    </section>

    <footer>
        <p>© 2024 <span>EduVibe</span> · All Rights Reserved</p>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const course = urlParams.get('course');

        const courses = {
            'web-development': {
                title: 'Web Development',
                description: 'Learn web development from scratch, covering HTML, CSS, and JavaScript. Build real-world projects and master modern frameworks.',
                videoUrl: 'https://www.youtube.com/embed/videoseries?list=PLZPZq0r_RZOPP5Yjt6IqgytMRY5uLt4y3'
            },
            'ui-ux-design': {
                title: 'UI/UX Design',
                description: 'Master the art of UI/UX design with hands-on projects and design principles. Learn Figma, user research, and prototyping.',
                videoUrl: 'https://www.youtube.com/embed/c9Wg6Cb_YlU?si=OPCg93gfEfueNz0S'
            },
            'business-strategy': {
                title: 'Business Strategy',
                description: 'Learn how to create successful business strategies that will drive your company forward. From market analysis to execution.',
                videoUrl: 'https://www.youtube.com/playlist?list=PLZDZwPWTxRmHHEfJW_6orzDXS1pPeUkP9'
            }
        };

        if (course && courses[course]) {
            const courseDetails = courses[course];
            document.getElementById('course-title').innerText = courseDetails.title;
            document.getElementById('course-description').innerText = courseDetails.description;
            document.getElementById('course-video').src = courseDetails.videoUrl;
            document.getElementById('start-course-btn').onclick = function() {
                alert('You have started the course! Good luck!');
            };

            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            var firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            let player;

            function onYouTubeIframeAPIReady() {
                player = new YT.Player('course-video', {
                    events: {
                        'onStateChange': onPlayerStateChange,
                        'onReady': onPlayerReady
                    }
                });
            }

            function onPlayerStateChange(event) {
                if (event.data == YT.PlayerState.PLAYING) {
                    let interval = setInterval(function() {
                        let currentTime = player.getCurrentTime();
                        let duration = player.getDuration();
                        let progress = (currentTime / duration) * 100;
                        localStorage.setItem(course, progress);
                        if (event.data == YT.PlayerState.ENDED) {
                            clearInterval(interval);
                        }
                    }, 1000);
                }
            }

            function onPlayerReady(event) {}

            const savedProgress = localStorage.getItem(course);
            if (savedProgress) {
                console.log(`Saved progress: ${Math.floor(savedProgress)}%`);
            }
        } else {
            document.getElementById('course-title').innerText = 'Course Not Found';
            document.getElementById('course-description').innerText = 'Sorry, we could not find this course. Please return to the courses page.';
            document.getElementById('start-course-btn').disabled = true;
            document.getElementById('start-course-btn').style.opacity = '0.5';
        }
    </script>
</body>
</html>
